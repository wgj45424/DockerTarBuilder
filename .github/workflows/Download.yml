name: Download and Commit with Git LFS
on:
  workflow_dispatch:
    inputs:
      artifact_name:
        description: '要下载的 Artifact 名称'
        required: true
        default: 'my-artifact'
      run_id:
        description: '要下载的 Workflow Run ID'
        required: true
      target_dir:
        description: '镜像文件在仓库中的存放目录'
        required: false
        default: 'docker-images'

jobs:
  download_and_commit:
    runs-on: ubuntu-22.04
    
    permissions:
      contents: write

    steps:
    - name: Checkout repository
      uses: actions/checkout@v4
      with:
        fetch-depth: 0

    - name: Install and configure Git LFS
      run: |
        sudo apt-get update
        sudo apt-get install -y git-lfs
        git lfs install
        
        # 追踪所有 .tar.gz 文件
        git lfs track "*.tar.gz"
        git add .gitattributes
        git commit -m "Configure Git LFS for .tar.gz files" || echo "No changes"

    - name: Download artifact
      uses: actions/download-artifact@v4
      with:
        name: ${{ github.event.inputs.artifact_name }}
        path: ${{ github.event.inputs.target_dir }}
        run-id: ${{ github.event.inputs.run_id }}
        github-token: ${{ secrets.GITHUB_TOKEN }}

    - name: Commit and push with Git LFS
      run: |
        git config user.name "github-actions[bot]"
        git config user.email "github-actions[bot]@users.noreply.github.com"
        
        git add ${{ github.event.inputs.target_dir }}/*.tar.gz
        
        if git diff --staged --quiet; then
          echo "No changes to commit"
        else
          TIMESTAMP=$(date +"%Y-%m-%d %H:%M:%S")
          git commit -m "Add Docker images from run ${{ github.event.inputs.run_id }} [skip ci]"
          git push
          echo "Successfully committed and pushed files"
        fi
