name: Upload to Release
on:
  workflow_dispatch:
    inputs:
      docker_images:
        description: '请填写docker镜像名称，多个用英文逗号分开'
        required: true
        default: 'alpine:latest,busybox:stable-glibc'
      release_tag:
        description: 'Release 标签（例如：v1.0.0）'
        required: true
        default: 'v1.0.0'
      release_name:
        description: 'Release 名称（可选，留空则使用标签名）'
        required: false
        default: ''

jobs:
  pull_and_upload_release:
    runs-on: ubuntu-22.04
    
    permissions:
      contents: write  # 创建 Release 和上传附件需要写入权限

    steps:
    - name: Checkout repository
      uses: actions/checkout@v4

    - name: Clean up Docker to free space
      run: |
        docker system prune -a -f
        docker volume prune -f
        echo "=== Available disk space ==="
        df -h /

    - name: Pull Docker Images and Package
      run: |
        images="${{ github.event.inputs.docker_images }}"
        IFS=',' read -r -a image_array <<< "$images"
        for image in "${image_array[@]}"; do
          # 去除可能的前后空格
          image=$(echo "$image" | xargs)
          echo "Processing: $image"
          
          docker pull "${image}" --platform "linux/amd64"
          
          # 生成安全的文件名（将 / 和 : 替换为 _）
          image_name="${image//\//_}"
          image_name="${image_name//:/_}"
          
          echo "Saving $image to ${image_name}-amd64.tar.gz"
          docker save "${image}" | gzip > "${image_name}-amd64.tar.gz"
          
          docker rmi "${image}" -f
        done
        
        echo "=== Generated files ==="
        ls -lh *.tar.gz

    - name: Create Release
      id: create_release
      uses: softprops/action-gh-release@v1
      with:
        tag_name: ${{ github.event.inputs.release_tag }}
        name: ${{ github.event.inputs.release_name || github.event.inputs.release_tag }}
        draft: false
        prerelease: false
        generate_release_notes: false
        files: |
          ${{ github.workspace }}/*.tar.gz
        fail_on_unmatched_files: true
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

    - name: Verify Release Upload
      run: |
        echo "=== Uploaded files to Release ==="
        echo "Release URL: https://github.com/${{ github.repository }}/releases/tag/${{ github.event.inputs.release_tag }}"
        echo "Files uploaded successfully!"
