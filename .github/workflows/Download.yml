name: x86-64 Pull and Save Docker Image
on:
  workflow_dispatch:
    inputs:
      artifact_name:
        description: 'Artifact 名称（用于标识上传的压缩包）'
        required: false
        default: 'my-artifact'
      docker_images:
        description: '请填写docker镜像名称，多个用英文逗号分开'
        required: true
        default: 'alpine:latest,busybox:stable-glibc'

jobs:
  pull_and_package:
    runs-on: ubuntu-22.04

    steps:
    - name: Checkout repository
      uses: actions/checkout@v4

    - name: Clean up Docker to free space
      run: |
        docker system prune -a -f
        docker volume prune -f

    - name: Pull Docker Images and Package
      run: |
        images="${{ github.event.inputs.docker_images }}"
        IFS=',' read -r -a image_array <<< "$images"
        for image in "${image_array[@]}"; do
          # 去除可能的前后空格
          image=$(echo "$image" | xargs)
          echo "Processing: $image"
          
          docker pull "${image}" --platform "linux/amd64"
          
          # 生成安全的文件名（将 / 和 : 替换为 _）
          image_name="${image//\//_}"
          image_name="${image_name//:/_}"
          
          docker save "${image}" -o "${image_name}-amd64.tar"
          gzip -c "${image_name}-amd64.tar" > "${image_name}-amd64.tar.gz"
          rm "${image_name}-amd64.tar"
        done
        
        echo "=== Generated files ==="
        ls -lh *.tar.gz

    - name: Upload artifact
      uses: actions/upload-artifact@v4
      with:
        name: ${{ github.event.inputs.artifact_name }}
        path: ${{ github.workspace }}/*.tar.gz
        retention-days: 1
