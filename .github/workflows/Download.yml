name: Download and Commit Docker Images
on:
  workflow_dispatch:
    inputs:
      artifact_name:
        description: '要下载的 Artifact 名称'
        required: true
        default: 'my-artifact'
      run_id:
        description: '要下载的 Workflow Run ID'
        required: true
      target_dir:
        description: '镜像文件在仓库中的存放目录'
        required: false
        default: 'docker-images'

jobs:
  download_and_commit:
    runs-on: ubuntu-22.04
    
    permissions:
      contents: write  # 需要写入权限才能 push

    steps:
    - name: Checkout repository
      uses: actions/checkout@v4
      with:
        fetch-depth: 0  # 获取完整历史，方便 commit

    - name: Download artifact
      uses: actions/download-artifact@v4
      with:
        name: ${{ github.event.inputs.artifact_name }}
        path: ${{ github.event.inputs.target_dir }}
        run-id: ${{ github.event.inputs.run_id }}
        github-token: ${{ secrets.GITHUB_TOKEN }}

    - name: List downloaded files
      run: |
        echo "=== Downloaded files ==="
        ls -lh ${{ github.event.inputs.target_dir }}/ || echo "No files found"

    - name: Commit and push to repository
      run: |
        # 配置 git 用户信息
        git config user.name "github-actions[bot]"
        git config user.email "github-actions[bot]@users.noreply.github.com"
        
        # 添加文件到暂存区
        git add ${{ github.event.inputs.target_dir }}/*.tar.gz
        
        # 检查是否有变更需要提交
        if git diff --staged --quiet; then
          echo "No changes to commit"
        else
          # 获取当前时间作为提交信息
          TIMESTAMP=$(date +"%Y-%m-%d %H:%M:%S")
          git commit -m "Add Docker images from run ${{ github.event.inputs.run_id }} [skip ci]"
          git push
          echo "Successfully committed and pushed files"
        fi
