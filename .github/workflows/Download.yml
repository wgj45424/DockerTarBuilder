name: Download Docker Images Artifact
on:
  workflow_dispatch:
    inputs:
      run_id:
        description: '要下载的 Workflow Run ID（留空则下载当前运行）'
        required: false
        default: ''
      download_path:
        description: '下载存放路径'
        required: false
        default: './downloaded-images'

jobs:
  download_artifact:
    runs-on: ubuntu-22.04

    steps:
    - name: Checkout repository
      uses: actions/checkout@v4

    # 调试步骤：列出所有 Artifact 确认名称
    - name: List all artifacts for debugging
      run: |
        echo "Listing artifacts for run ID: ${{ github.event.inputs.run_id || github.run_id }}"
        gh api repos/${{ github.repository }}/actions/runs/${{ github.event.inputs.run_id || github.run_id }}/artifacts --jq '.artifacts[] | {name: .name, expired: .expired, size: .size_in_bytes}'
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

    - name: Download artifact by run_id
      if: github.event.inputs.run_id != ''
      uses: actions/download-artifact@v4
      with:
        name: my-artifact                    # 👈 关键修改：改为你上传时使用的名称
        path: ${{ github.event.inputs.download_path }}
        run-id: ${{ github.event.inputs.run_id }}
        github-token: ${{ secrets.GITHUB_TOKEN }}

    - name: Download latest artifact (current run)
      if: github.event.inputs.run_id == ''
      uses: actions/download-artifact@v4
      with:
        name: my-artifact                    # 👈 关键修改：改为你上传时使用的名称
        path: ${{ github.event.inputs.download_path }}

    - name: List downloaded files
      run: |
        echo "=== Downloaded files ==="
        ls -lh ${{ github.event.inputs.download_path }}/ || echo "No files found"
        echo ""
        echo "=== File details ==="
        find ${{ github.event.inputs.download_path }} -type f -name "*.tar.gz" -exec ls -lh {} \;
