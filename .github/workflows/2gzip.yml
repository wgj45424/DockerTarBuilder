name: Get-AMD64-2gzip

on:
  workflow_dispatch:
    inputs:
      docker_images:
        description: '请填写docker镜像名称,多个用英文逗号分开'
        required: true
        default: 'alpine:latest,alpine/curl,busybox:stable-glibc'

jobs:
  pull_and_package:
    runs-on: ubuntu-22.04
    permissions:
      contents: write
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Pull Docker Images and Package
        run: |
          images="${{ github.event.inputs.docker_images }}"
          IFS=',' read -r -a image_array <<< "$images"
          for image in "${image_array[@]}"; do
            image=$(echo "$image" | xargs)
            echo "Processing: $image"
            
            docker pull "${image}" --platform "linux/amd64"
            
            image_name="${image//\//_}"
            image_name="${image_name//:/_}"
            
            docker save "${image}" -o "${image_name}-amd64.tar"
            
            file_size=$(stat -c%s "${image_name}-amd64.tar")
            max_size=2147483648
            
            if (( file_size > max_size )); then
              echo "⚠️ 文件超过2GB，开始分片..."
              CHUNK_SIZE=1900M
              split -b ${CHUNK_SIZE} -a 3 -d "${image_name}-amd64.tar" "${image_name}-amd64.tar.part-"
              rm "${image_name}-amd64.tar"
              echo "✅ 分片完成"
            else
              echo "✅ 文件小于2GB，直接压缩..."
              gzip -c "${image_name}-amd64.tar" > "${image_name}-amd64.tar.gz"
              rm "${image_name}-amd64.tar"
            fi
          done

      - name: List generated files
        run: |
          echo "=========================================="
          echo "📦 生成的文件列表："
          echo "=========================================="
          find $GITHUB_WORKSPACE -maxdepth 1 -type f \( -name "*.tar.gz" -o -name "*.part-*" \) -exec ls -lh {} \;
          
          release_name=$(TZ="Asia/Shanghai" date +'%Y-%m-%d %H:%M Build')
          echo "RELEASE_NAME=$release_name" >> $GITHUB_ENV

      - name: Clean up existing release and tag
        run: |
          echo "🧹 开始清理已存在的 Release 和 Tag..."
          
          if gh release view 1.0.0 --repo ${{ github.repository }} &>/dev/null; then
            echo "发现已存在的 Release，正在删除..."
            gh release delete 1.0.0 --repo ${{ github.repository }} --yes
            echo "✅ Release 已删除"
          else
            echo "Release 不存在，无需删除"
          fi
          
          if git rev-parse 1.0.0 &>/dev/null; then
            echo "发现已存在的本地 Tag，正在删除..."
            git tag -d 1.0.0
            git push --delete origin 1.0.0 || echo "远程 Tag 不存在或已删除"
            echo "✅ Tag 已删除"
          else
            echo "本地 Tag 不存在，无需删除"
          fi
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2.1.0
        with:
          tag_name: 1.0.0
          name: ${{ env.RELEASE_NAME }} for x86-64
          body: |
            [![Github](https://img.shields.io/badge/RELEASE:DockerTarBuilder-123456?logo=github&logoColor=fff&labelColor=green&style=for-the-badge)](https://www.bilibili.com/video/BV1EZ421M7mL) [![Github](https://img.shields.io/badge/国内加速站下载-FC7C0D?logo=github&logoColor=fff&labelColor=000&style=for-the-badge)](https://wkdaily.cpolar.top/archives/1)
            
            ### 📦 包含的镜像
            ${{ github.event.inputs.docker_images }}
            
            ### 🔧 使用方法
            **对于普通镜像（.tar.gz 文件）：**
            ```bash
            docker load -i 镜像名-amd64.tar.gz
